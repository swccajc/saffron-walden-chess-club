<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saffron Walden Chess Club</title>
  <meta name="description" content="Saffron Walden Chess Club – Join us for friendly chess games, tournaments, and learning opportunities for all skill levels." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="header-container"></div>

  <main>
    <section id="about">
      <h2>About</h2>
      <p>Loading...</p>
    </section>

    <section id="calendar">
      <h2>Next event</h2>
      <div class="event-details"></div>
    </section>
  </main>

  <script src="js/header.js" defer></script>
  <script defer>
    (async () => {
      await window.loadHeader();
      // Now run index.js logic after header is loaded
      const resp = await fetch('content/about.txt');
      const aboutText = await resp.text();
      const aboutEl = document.querySelector('#about p');
      if (aboutEl) aboutEl.textContent = aboutText;

      const [eventsText, locationsText] = await Promise.all([
        fetch('content/events.csv').then(r => r.text()),
        fetch('content/locations.txt').then(r => r.text()),
      ]);

      const locations = {};
      locationsText.split('\n').forEach(line => {
        const [key, name, address, map_url] = line.split('|');
        if (key) locations[key.trim()] = { name, address, map_url };
      });

      const today = new Date();
      const events = eventsText.split('\n').slice(1).map(line => {
        if (!line.trim()) return null;
        const [date, time, location_key, note] = line.split(',');
        return { date, time, location_key, note };
      }).filter(e => e && new Date(e.date + "T00:00:00") >= today);

      if (events.length === 0) return;

      events.sort((a, b) => new Date(a.date) - new Date(b.date));
      const nextEvent = events[0];
      const location = locations[nextEvent.location_key];
      const container = document.querySelector('#calendar .event-details');

      if (container && location) {
        container.innerHTML = `
          <div>
            <p class="event-date">
              <a href="calendar.html">${nextEvent.time} ${new Date(nextEvent.date).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</a>
            </p>
            <p class="event-address">
              ${location.name}<br>
              ${location.address.replace(/, /g,'<br>')}
            </p>
          </div>
          <div>
            <iframe src="${location.map_url}&output=embed" loading="lazy" title="Map showing ${location.name}"></iframe>
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
